version: '3.9'

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - '8080:8080'
    environment:
      PORT: 8080
      HOST: 0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:8080/items?limit=1']
      interval: 10s
      timeout: 5s
      retries: 3

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
      args:
        VITE_LLM_BASE_URL: ${VITE_LLM_BASE_URL:-http://localhost:11434}
        VITE_LLM_MODEL: ${VITE_LLM_MODEL:-llama3}
    ports:
      - '3000:80'
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
